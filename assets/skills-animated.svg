<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="animated skill bars">
  <defs>
    <linearGradient id="g3" x1="0" x2="1">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="50%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#07101d" />
  <g transform="translate(24,28)">
    <text x="0" y="20" font-family="Inter, system-ui" font-size="18" fill="#cfe8ff">Skills</text>

    <!-- helper to render each bar -->
    <g id="bars" transform="translate(0,36)">
      <!-- row template: label, percent, bg, fill -->
      <!-- TypeScript -->
      <text x="0" y="28" font-family="Inter" font-size="14" fill="#bfdcff">TypeScript</text>
      <text x="820" y="28" font-family="Inter" font-size="13" fill="#81a9d4" text-anchor="end">95%</text>
      <rect x="0" y="36" width="840" height="14" rx="7" fill="#0f2233" />
      <rect x="0" y="36" width="0" height="14" rx="7" fill="url(#g3)">
        <animate attributeName="width" from="0" to="798" dur="900ms" begin="0.2s" fill="freeze" />
      </rect>

      <!-- Solidity -->
      <text x="0" y="84" font-family="Inter" font-size="14" fill="#bfdcff">Solidity</text>
      <text x="820" y="84" font-family="Inter" font-size="13" fill="#81a9d4" text-anchor="end">75%</text>
      <rect x="0" y="92" width="840" height="14" rx="7" fill="#0f2233" />
      <rect x="0" y="92" width="0" height="14" rx="7" fill="url(#g3)">
        <animate attributeName="width" from="0" to="630" dur="900ms" begin="0.4s" fill="freeze" />
      </rect>

      <!-- Python -->
      <text x="0" y="140" font-family="Inter" font-size="14" fill="#bfdcff">Python</text>
      <text x="820" y="140" font-family="Inter" font-size="13" fill="#81a9d4" text-anchor="end">70%</text>
      <rect x="0" y="148" width="840" height="14" rx="7" fill="#0f2233" />
      <rect x="0" y="148" width="0" height="14" rx="7" fill="url(#g3)">
        <animate attributeName="width" from="0" to="588" dur="900ms" begin="0.6s" fill="freeze" />
      </rect>

      <!-- JavaScript -->
      <text x="0" y="196" font-family="Inter" font-size="14" fill="#bfdcff">JavaScript</text>
      <text x="820" y="196" font-family="Inter" font-size="13" fill="#81a9d4" text-anchor="end">60%</text>
      <rect x="0" y="204" width="840" height="14" rx="7" fill="#0f2233" />
      <rect x="0" y="204" width="0" height="14" rx="7" fill="url(#g3)">
        <animate attributeName="width" from="0" to="504" dur="900ms" begin="0.8s" fill="freeze" />
      </rect>

      <!-- SQL -->
      <text x="0" y="252" font-family="Inter" font-size="14" fill="#bfdcff">SQL</text>
      <text x="820" y="252" font-family="Inter" font-size="13" fill="#81a9d4" text-anchor="end">50%</text>
      <rect x="0" y="260" width="840" height="14" rx="7" fill="#0f2233" />
      <rect x="0" y="260" width="0" height="14" rx="7" fill="url(#g3)">
        <animate attributeName="width" from="0" to="420" dur="900ms" begin="1s" fill="freeze" />
      </rect>

    </g>
  </g>
</svg>
