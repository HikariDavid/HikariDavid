<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="50%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="100%" stop-color="#0b1630"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <style>
    .title { fill: url(#g); font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-weight:700; font-size:64px; }
    .subtitle { fill: #9fb4d6; font-family: 'Inter', sans-serif; font-size:20px; }
    .tspan-anim { filter: url(#glow); }
    .move { animation: slide 6s linear infinite; }
    @keyframes slide { 0%{transform:translateX(-25%)} 50%{transform:translateX(25%)} 100%{transform:translateX(-25%)} }
  </style>

  <g transform="translate(60,80)">
    <text class="title tspan-anim move" x="0" y="0">HikariDavid</text>
    <text class="subtitle" x="0" y="60">Blockchain · AI · Real-time Infrastructure</text>
  </g>

  <!-- subtle animated underline -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="800" height="4" rx="2" fill="#122134" />
    <rect x="-300" y="0" width="300" height="4" rx="2" fill="url(#g)">
      <animate attributeName="x" from="-300" to="900" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

</svg>
